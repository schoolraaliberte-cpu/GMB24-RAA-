<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB24-RAA - Accès</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#f0f2f5; margin:0; padding:20px}
.box{background:white; padding:35px; border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,0.08); width:100%; max-width:380px; text-align:center}
h2{text-align:center; color:#1e293b; margin:0 0 20px 0; font-size:24px}
.locked h2{color:#dc2626; font-size:22px}
.paiement{background:#fef3c7; padding:20px; border-radius:10px; margin:20px 0; border-left:4px solid #f59e0b; text-align:center}
.numero{font-size:26px; font-weight:bold; letter-spacing:1px; color:#b45309; margin:8px 0}
.btn-moov{width:100%; padding:15px; background:#FF6B00; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600; font-size:16px; margin-top:10px}
.btn-moov:hover{background:#e55f00}
.btn-call{width:100%; padding:15px; background:#16a34a; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600; font-size:16px; margin-top:8px}
.btn-call:hover{background:#15803d}
.info{font-size:13px; color:#64748b; text-align:center; margin-top:15px}
.compteur{font-size:14px; color:#2563eb; margin-bottom:15px; font-weight:600}
.hidden{display:none}
</style>
</head>
<body>

<div class="box" id="appBox">
  <h2>GMB24-RAA</h2>
  <div class="compteur" id="compteurJours"></div>
  <p>Chargement de l’application...</p>
</div>

<div class="box locked hidden" id="lockedBox">
  <h2>ESSAI GRATUIT TERMINÉ</h2>
  <p style="color:#64748b">Renouvelle pour continuer l’accès</p>
  <div class="paiement">
    <b>Paiement Mobile Money 2000 FCFA/mois :</b>
    <div class="numero">Moov: +22896766875</div>
    <div class="numero">TMoney: +22870346852</div>
  </div>
  <button class="btn-moov" onclick="copierNumero('+22896766875')">Copier numéro Moov</button>
  <button class="btn-call" onclick="window.location.href='tel:+22870346852'">Appeler 70346852 pour confirmer</button>
  <p class="info">Après paiement, écris-nous sur WhatsApp pour débloquer ton accès</p>
</div>

<script>
// 1. CODE ESSAI 30 JOURS
function checkEssaiGratuit() {
  const AUJOURDHUI = new Date();
  let dateInstall = localStorage.getItem('date_install_gmb24');
  
  if(!dateInstall) {
    localStorage.setItem('date_install_gmb24', AUJOURDHUI.toISOString());
    dateInstall = AUJOURDHUI.toISOString();
    console.log('Essai gratuit démarré: 30 jours');
  }
  
  const dateDebut = new Date(dateInstall);
  const joursPasses = Math.floor((AUJOURDHUI - dateDebut) / (1000 * 60 * 60 * 24));
  const joursRestants = 30 - joursPasses;
  
  if(joursPasses >= 30) {
    document.getElementById('appBox').classList.add('hidden');
    document.getElementById('lockedBox').classList.remove('hidden');
    return false;
  } else {
    document.getElementById('compteurJours').innerText = `Essai gratuit: ${joursRestants} jour(s) restant(s)`;
    lancerApp();
    return true;
  }
}

// 2. COPIER NUMERO
function copierNumero(num) {
  navigator.clipboard.writeText(num);
  alert('Numéro ' + num + ' copié!\n\nÉtapes Moov/TMoney:\n1. Compose *555# ou *145#\n2. Transfert d\'argent\n3. Colle le numéro\n4. Montant: 2000 FCFA\n5. Référence: Ton nom');
}

// 3. LANCER L'APP
function lancerApp() {
  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 1500);
}

// 4. DÉMARRAGE
checkEssaiGratuit();

// 5. PWA
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
  </html>
