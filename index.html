<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion SMS - GMB24</title>
</head>
<body>
  <h2>Connexion avec numéro +228</h2>
  
  <input type="tel" id="phone" placeholder="+22896766875" value="+228" />
  <button id="btn-sms">Envoyer SMS</button>
  
  <br><br>
  <input type="text" id="code" placeholder="Code de vérification" />
  <button id="btn-code">Vérifier</button>

  <!-- reCAPTCHA invisible obligatoire pour Firebase -->
  <div id="recaptcha-container"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

    // TA VRAIE CONFIG FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyCBYnjsBMJGeR57Kk3FX9zeIplE5EFkcIY",
      authDomain: "gmb24-raa.firebaseapp.com",
      databaseURL: "https://gmb24-raa-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "gmb24-raa",
      storageBucket: "gmb24-raa.firebasestorage.app",
      messagingSenderId: "558507911211",
      appId: "1:558507911211:web:5cdc99c082fe653684626e",
      measurementId: "G-KVHFHTJVFN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const analytics = getAnalytics(app);

    // reCAPTCHA invisible
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
      'size': 'invisible',
      'callback': () => {
        console.log('reCAPTCHA prêt');
      }
    });

    // Envoyer SMS
    document.getElementById('btn-sms').addEventListener('click', () => {
      const phoneNumber = document.getElementById('phone').value;
      
      signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
        .then((confirmationResult) => {
          window.confirmationResult = confirmationResult;
          alert('Code envoyé ! Pour le test tape: 703468');
        })
        .catch((error) => {
          alert('Erreur: ' + error.message);
          console.error(error);
        });
    });

    // Vérifier code
    document.getElementById('btn-code').addEventListener('click', () => {
      const code = document.getElementById('code').value;
      
      window.confirmationResult.confirm(code)
        .then((result) => {
          alert('Connecté avec succès ! ' + result.user.phoneNumber);
        })
        .catch(() => {
          alert('Code incorrect. Vérifie 703468');
        });
    });
  </script>
</body>
</html>
