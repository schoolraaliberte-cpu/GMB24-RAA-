<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB24 - Caisse Pro</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#f1f5f9;margin:0;padding:20px}
.container{max-width:500px;margin:auto;background:white;padding:25px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #cbd5e1;font-size:16px}
button{background:#10b981;color:white;border:none;font-weight:bold;cursor:pointer}
button:disabled{background:#94a3b8}
.tabs{display:flex;gap:10px;margin-bottom:20px}
.tab{flex:1;padding:10px;text-align:center;background:#e2e8f0;cursor:pointer;border-radius:8px}
.tab.active{background:#3b82f6;color:white}
.hidden{display:none}
#recaptcha-container{height:0;overflow:hidden}
h2{text-align:center;color:#0f172a}
</style>
</head>
<body>
<div class="container">
<h2>🧾 GMB24 Pro Fiscal</h2>
<p style="text-align:center;color:#64748b">Gestion boutique OTR - Togo</p>

<div class="tabs">
<div class="tab active" onclick="showTab('client')">Client</div>
<div class="tab" onclick="showTab('caisse')">Caisse</div>
</div>

<!-- ONGLET CLIENT -->
<div id="client">
<h3>Activation Licence</h3>
<div id="step1">
<input type="tel" id="phone" placeholder="+228XXXXXXXX" value="+22870346852">
<button id="btnSend" onclick="sendOTP()">Recevoir le code SMS</button>
<p style="font-size:12px;color:#64748b">30 jours gratuits pour tester. Après → licence 5000F/30j</p>
</div>

<div id="step2" class="hidden">
<input type="text" id="otp" placeholder="Code SMS 6 chiffres" maxlength="6">
<input type="text" id="licenseCode" placeholder="Code GMBXXXX">
<button onclick="verifyOTP()">Vérifier SMS</button>
<button onclick="activateLicense()">Activer Licence</button>
</div>

<p id="clientMsg"></p>
</div>

<!-- ONGLET CAISSE -->
<div id="caisse" class="hidden">
<h3>Vente</h3>
<p id="statusLicence">⚠️ Licence non activée</p>
<input type="text" id="prodName" placeholder="Nom produit">
<input type="number" id="prodPrix" placeholder="Prix FCFA">
<button onclick="vendre()">Valider Vente</button>
<div id="ventes"></div>
</div>

<div id="recaptcha-container"></div>
</div>

<script>
// CONFIG FIREBASE - Mets tes vraies clés
const firebaseConfig = {
  apiKey: "VOTRE_API_KEY",
  authDomain: "gmb24-raa.firebaseapp.com",
  projectId: "gmb24-raa",
  storageBucket: "gmb24-raa.appspot.com",
  messagingSenderId: "VOTRE_SENDER_ID",
  appId: "VOTRE_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let confirmationResult;
let userPhone;
let currentUser = null;

// Tabs
function showTab(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('#client, #caisse').forEach(d => d.classList.add('hidden'));
  event.target.classList.add('active');
  document.getElementById(tab).classList.remove('hidden');
  
  if(tab === 'caisse' && currentUser){
    checkLicence();
  }
}

// Init reCAPTCHA INVISIBLE - CORRECTION PRINCIPALE
window.onload = () => {
  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
    'size': 'invisible',
    'callback': () => {
      console.log("reCAPTCHA validé");
    }
  });
};

// Envoi SMS OTP - CORRIGÉ
async function sendOTP(){
  const phone = document.getElementById('phone').value.trim();
  const msg = document.getElementById('clientMsg');
  
  if(!phone.startsWith('+228') || phone.length < 13){
    msg.innerText = "❌ Format: +228XXXXXXXX";
    msg.style.color = "red";
    return;
  }
  
  document.getElementById('btnSend').disabled = true;
  msg.innerText = "Envoi SMS...";
  msg.style.color = "blue";
  
  try{
    confirmationResult = await auth.signInWithPhoneNumber(phone, window.recaptchaVerifier);
    userPhone = phone;
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    msg.innerText = "✅ Code envoyé. Si numéro test, tape 123456";
    msg.style.color = "green";
  } catch(e){
    msg.innerText = "❌ Erreur: " + e.code + " - " + e.message;
    msg.style.color = "red";
    console.error("Erreur SMS:", e);
    document.getElementById('btnSend').disabled = false;
    window.recaptchaVerifier.render(); // reset reCAPTCHA
  }
}

// Vérifier code SMS
async function verifyOTP(){
  const code = document.getElementById('otp').value;
  const msg = document.getElementById('clientMsg');
  try{
    const result = await confirmationResult.confirm(code);
    currentUser = result.user;
    msg.innerText = "✅ Téléphone vérifié. Mets ton code GMB";
    msg.style.color = "green";
  } catch(e){
    msg.innerText = "❌ Code SMS incorrect";
    msg.style.color = "red";
  }
}

// Activer licence
async function activateLicense(){
  const code = document.getElementById('licenseCode').value.trim();
  const msg = document.getElementById('clientMsg');
  
  if(!currentUser){
    msg.innerText = "❌ Vérifie d'abord ton SMS avec 123456";
    msg.style.color = "red";
    return;
  }
  
  try{
    const doc = await db.collection('codesLicence').doc(code).get();
    if(!doc.exists || doc.data().used){
      msg.innerText = "❌ Code invalide ou déjà utilisé";
      msg.style.color = "red";
      return;
    }
    
    const data = doc.data();
    if(data.phone !== userPhone){
      msg.innerText = "❌ Ce code n'est pas pour ce numéro";
      msg.style.color = "red";
      return;
    }
    
    const expireDate = new Date();
    expireDate.setDate(expireDate.getDate() + 30);
    
    await db.collection('licences').doc(userPhone).set({
      phone: userPhone,
      code: code,
      activatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      expireAt: expireDate
    });
    
    await db.collection('codesLicence').doc(code).update({used: true});
    
    msg.innerText = `✅ Licence activée jusqu'au ${expireDate.toLocaleDateString()}`;
    msg.style.color = "green";
    localStorage.setItem('gmb24_phone', userPhone);
    
  } catch(e){
    msg.innerText = "❌ Erreur: " + e.message;
    msg.style.color = "red";
  }
}

// Vérifier licence
async function checkLicence(){
  const phone = localStorage.getItem('gmb24_phone');
  if(!phone) return;
  
  const doc = await db.collection('licences').doc(phone).get();
  const status = document.getElementById('statusLicence');
  
  if(doc.exists && doc.data().expireAt.toDate() > new Date()){
    status.innerText = "✅ Licence active jusqu'au " + doc.data().expireAt.toDate().toLocaleDateString();
    status.style.color = "green";
  } else {
    status.innerText = "⚠️ Licence expirée. Active avec un code GMB";
    status.style.color = "red";
  }
}

// Vente
async function vendre(){
  const phone = localStorage.getItem('gmb24_phone');
  const nom = document.getElementById('prodName').value;
  const prix = parseInt(document.getElementById('prodPrix').value);
  
  if(!phone) return alert("Active ta licence d'abord");
  
  await db.collection('ventes').add({
    phone: phone,
    produit: nom,
    prix: prix,
    date: firebase.firestore.FieldValue.serverTimestamp()
  });
  
  alert("✅ Vente: " + nom + " - " + prix + " FCFA");
  document.getElementById('prodName').value = "";
  document.getElementById('prodPrix').value = "";
}
</script>
</body>
</html>
