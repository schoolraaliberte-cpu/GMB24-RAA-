<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB24-RAA - Connexion</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#f0f2f5; margin:0; padding:20px}
.box{background:white; padding:35px; border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,0.08); width:100%; max-width:360px}
h2{text-align:center; color:#1e293b; margin:0 0 25px 0; font-size:24px}
input{width:100%; padding:14px; margin:10px 0; border:1px solid #cbd5e1; border-radius:8px; font-size:15px; outline:none; transition:border 0.2s}
input:focus{border-color:#2563eb}
button{width:100%; padding:14px; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer; margin-top:12px; font-weight:600; font-size:15px; transition:background 0.2s}
button:hover{background:#1d4ed8}
button:disabled{background:#94a3b8; cursor:not-allowed}
.hidden{display:none}
.locked{text-align:center}
.locked h2{color:#dc2626; font-size:22px}
.paiement{background:#fef3c7; padding:18px; border-radius:10px; margin:20px 0; border-left:4px solid #f59e0b; text-align:left}
.paiement b{font-size:16px}
.call-btn{background:#16a34a; margin-top:8px}
.call-btn:hover{background:#15803d}
.info{font-size:13px; color:#64748b; text-align:center; margin-top:15px}
</style>
</head>
<body>

<!-- ÉCRAN 1: LOGIN EMAIL LINK -->
<div class="box" id="loginBox">
  <h2>GMB24-RAA</h2>
  <input type="email" id="email" placeholder="Ton email" value="schoolraaliberte@gmail.com">
  <button id="btnSendCode">Recevoir le code par email</button>
  <div id="codeBox" class="hidden">
    <p class="info">Code envoyé. Vérifie ta boîte + spams</p>
    <input type="text" id="code" placeholder="Colle le code ici">
    <button id="btnVerify">Entrer dans l'app</button>
  </div>
</div>

<!-- ÉCRAN 2: ABONNEMENT TERMINÉ -->
<div class="box locked hidden" id="lockedBox">
  <h2>L’ABONNEMENT EST TERMINÉ</h2>
  <p style="color:#64748b">Renouvelle pour continuer l’accès</p>
  
  <div class="paiement">
    <b>Paiement Mobile Money :</b><br><br>
    TGO 96766875<br>
    YAS 70346852
  </div>
  
  <button class="call-btn" onclick="window.location.href='tel:+22896766875'">Appel confirmé</button>
  <button id="btnOpen">Ouvrir - J’ai payé</button>
  
  <div id="codeLicenceBox" class="hidden">
    <input type="text" id="codeLicence" placeholder="Entrez votre code GMBXXXX" style="text-transform:uppercase">
    <button id="btnActivate">Activer 30 jours</button>
  </div>
  
  <p class="info">Appelle d’abord, puis clique "Ouvrir" pour entrer ton code</p>
</div>

<script type="module">
import { sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase/auth.js";
import { doc, getDoc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase/firestore.js";
import { auth, db } from "./firebaseConfig.js";

const loginBox = document.getElementById("loginBox");
const lockedBox = document.getElementById("lockedBox");
const codeBox = document.getElementById("codeBox");
const codeLicenceBox = document.getElementById("codeLicenceBox");
const btnSendCode = document.getElementById("btnSendCode");

// Si déjà connecté, vérifie licence direct
onAuthStateChanged(auth, async (user) => {
  if(user) {
    await verifierLicence(user.email);
  }
});

// 1. ENVOYER LIEN MAGIQUE 24H
btnSendCode.onclick = async () => {
  const email = document.getElementById("email").value.trim();
  if(!email) { alert("Entre ton email"); return; }
  
  btnSendCode.disabled = true;
  btnSendCode.textContent = "Envoi...";
  
  const actionCodeSettings = { 
    url: window.location.href, 
    handleCodeInApp: true 
  };
  
  try {
    await sendSignInLinkToEmail(auth, email, actionCodeSettings);
    window.localStorage.setItem("emailForSignIn", email);
    codeBox.classList.remove("hidden");
    btnSendCode.textContent = "Code envoyé ✓";
  } catch(e) {
    alert("Erreur: " + e.message);
    btnSendCode.disabled = false;
    btnSendCode.textContent = "Recevoir le code par email";
  }
};

// 2. VÉRIFIER CODE + VÉRIFIER LICENCE
document.getElementById("btnVerify").onclick = async () => {
  const code = document.getElementById("code").value.trim();
  if(!code) { alert("Colle le code reçu par email"); return; }
  
  if(isSignInWithEmailLink(auth, window.location.href)) {
    const email = window.localStorage.getItem("emailForSignIn");
    try {
      await signInWithEmailLink(auth, email, window.location.href);
      window.localStorage.removeItem("emailForSignIn");
      await verifierLicence(email);
    } catch(e) {
      alert("Code invalide ou expiré: " + e.message);
    }
  } else {
    alert("Lien invalide. Demande un nouveau code.");
  }
};

// 3. LOGIQUE LICENCE : ESSAI 30J OU VERROUILLÉ
async function verifierLicence(email) {
  const userId = btoa(email).replace(/=/g, "");
  const licRef = doc(db, "licences", userId);
  const snap = await getDoc(licRef);
  
  if(!snap.exists()) {
    // MOIS 1 GRATUIT
    const expireAt = new Date();
    expireAt.setDate(expireAt.getDate() + 30);
    await setDoc(licRef, {
      email: email,
      expireAt: expireAt,
      statut: "essai",
      codeLicence: "",
      createdAt: serverTimestamp()
    });
    window.location.href = "dashboard.html";
  } else {
    const data = snap.data();
    const now = new Date();
    const expire = data.expireAt.toDate();
    
    if(expire > now) {
      // Licence active
      window.location.href = "dashboard.html";
    } else {
      // ABONNEMENT TERMINÉ
      loginBox.classList.add("hidden");
      lockedBox.classList.remove("hidden");
    }
  }
}

// 4. BOUTON OUVRIR → CHAMP CODE LICENCE
document.getElementById("btnOpen").onclick = () => {
  codeLicenceBox.classList.remove("hidden");
};

// 5. ACTIVER AVEC CODE GMBXXXX
document.getElementById("btnActivate").onclick = async () => {
  const code = document.getElementById("codeLicence").value.trim().toUpperCase();
  if(!code || !code.startsWith("GMB")) { 
    alert("Code invalide. Format: GMBXXXX"); 
    return; 
  }
  
  const user = auth.currentUser;
  if(!user) { alert("Reconnecte-toi"); return; }
  
  const userId = btoa(user.email).replace(/=/g, "");
  
  try {
    const codeRef = doc(db, "codesLicence", code);
    const codeSnap = await getDoc(codeRef);
    
    if(!codeSnap.exists()) {
      alert("Code introuvable");
      return;
    }
    if(codeSnap.data().used === true) {
      alert("Code déjà utilisé");
      return;
    }
    
    const newExpire = new Date();
    newExpire.setDate(newExpire.getDate() + 30);
    
    await updateDoc(doc(db, "licences", userId), {
      expireAt: newExpire,
      statut: "actif",
      codeLicence: code
    });
    
    await updateDoc(codeRef, { 
      used: true, 
      clientId: userId,
      usedAt: serverTimestamp()
    });
    
    alert("Abonnement activé 30 jours !");
    window.location.href = "dashboard.html";
    
  } catch(e) {
    alert("Erreur activation: " + e.message);
  }
};
</script>
</body>
</html>
