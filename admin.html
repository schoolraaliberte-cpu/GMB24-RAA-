<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB24-RAA Admin - schoolraaliberte@gmail.com</title>
<style>
body{font-family:Arial,sans-serif;background:#1a1a2e;color:#fff;margin:0;padding:20px}
.container{max-width:1000px;margin:auto;background:#16213e;padding:30px;border-radius:10px}
h2{color:#f39c12;text-align:center}
table{width:100%;border-collapse:collapse;margin-top:20px;font-size:14px}
th,td{padding:12px;text-align:left;border-bottom:1px solid #2e4057}
th{background:#0f3460;color:#f39c12}
.btn{padding:8px 15px;border:none;border-radius:5px;cursor:pointer;font-weight:bold;margin:2px}
.btn-green{background:#27ae60;color:white}
.btn-orange{background:#f39c12;color:white}
.btn-red{background:#e74c3c;color:white}
input{padding:10px;border-radius:5px;border:1px solid #555;background:#0f3460;color:white;width:280px;margin:5px}
.msg{padding:10px;border-radius:5px;margin:10px 0}
.success{background:#27ae60}
.error{background:#e74c3c}
.hidden{display:none}
.stats{display:flex;gap:20px;margin:20px 0;flex-wrap:wrap}
.stat-box{background:#0f3460;padding:20px;border-radius:8px;flex:1;min-width:150px;text-align:center}
.stat-box h3{margin:0;color:#f39c12;font-size:32px}
</style>
</head>
<body>
<div class="container" id="loginBox">
  <h2>GMB24-RAA ADMIN</h2>
  <p style="text-align:center">Connexion réservée à: schoolraaliberte@gmail.com</p>
  <input type="email" id="adminEmail" placeholder="schoolraaliberte@gmail.com" value="schoolraaliberte@gmail.com" readonly>
  <button class="btn btn-green" onclick="sendAdminLink()">Recevoir code Firebase 24h</button>
  <div id="loginMsg"></div>
</div>

<div class="container hidden" id="adminPanel">
  <h2>Tableau de bord Admin</h2>
  
  <div class="stats">
    <div class="stat-box"><h3 id="totalUsers">0</h3><p>Clients inscrits</p></div>
    <div class="stat-box"><h3 id="activeUsers">0</h3><p>Licences actives</p></div>
    <div class="stat-box"><h3 id="expiredUsers">0</h3><p>Expirés à renouveler</p></div>
  </div>

  <h3>Générer code licence GMBXXXX +30 jours</h3>
  <input type="email" id="clientEmail" placeholder="Email du client">
  <input type="tel" id="clientPhone" placeholder="22896766875 sans +">
  <button class="btn btn-green" onclick="generateCode()">Générer + WhatsApp</button>
  <div id="genMsg"></div>

  <h3>Liste des clients</h3>
  <table>
    <thead>
      <tr><th>Email</th><th>Téléphone</th><th>Statut</th><th>Expire le</th><th>Code actuel</th><th>Action</th></tr>
    </thead>
    <tbody id="usersTable"></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBYnjsBMJGeR57Kk3FX9zeIplE5EFkcIY",
  authDomain: "gmb24-raa.firebaseapp.com",
  projectId: "gmb24-raa",
  storageBucket: "gmb24-raa.firebasestorage.app",
  messagingSenderId: "558507911211",
  appId: "1:558507911211:web:5cdc99c082fe653684626e"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "schoolraaliberte@gmail.com";
const actionCodeSettings = {url: window.location.href, handleCodeInApp: true};

// Vérifie lien Firebase au chargement
if(isSignInWithEmailLink(auth, window.location.href)){
  let email = window.localStorage.getItem('emailForSignIn');
  if(!email) email = prompt('Confirmez email admin');
  signInWithEmailLink(auth, email, window.location.href).then(async(result)=>{
    if(result.user.email !== ADMIN_EMAIL) return alert("Accès refusé. Email admin: "+ADMIN_EMAIL);
    window.localStorage.removeItem('emailForSignIn');
    loadAdminPanel();
  }).catch(e=>alert("Erreur: "+e.message));
}

window.sendAdminLink = async function(){
  const email = document.getElementById('adminEmail').value;
  const msg = document.getElementById('loginMsg');
  if(email !== ADMIN_EMAIL) return msg.innerHTML = '<div class="msg error">Email non autorisé</div>';
  try{
    await sendSignInLinkToEmail(auth, email, actionCodeSettings);
    window.localStorage.setItem('emailForSignIn', email);
    msg.innerHTML = '<div class="msg success">Code envoyé sur '+email+'. Vérifiez vos mails.</div>';
  }catch(e){
    msg.innerHTML = '<div class="msg error">Erreur: '+e.message+'</div>';
  }
}

async function loadAdminPanel(){
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('adminPanel').classList.remove('hidden');
  await loadUsers();
}

async function loadUsers(){
  const snap = await getDocs(collection(db, "licences"));
  const tbody = document.getElementById('usersTable');
  tbody.innerHTML = "";
  let total=0, active=0, expired=0;
  const now = new Date();

  snap.forEach(docSnap=>{
    const d = docSnap.data();
    total++;
    const expireDate = d.expireAt ? d.expireAt.toDate() : null;
    const isActive = expireDate && expireDate > now;
    if(isActive) active++; else expired++;
    const statut = d.statut === "essai" ? "Essai 30j" : isActive ? "Actif" : "Expiré";
    const color = isActive ? "#27ae60" : "#e74c3c";
    
    tbody.innerHTML += `<tr>
      <td>${d.email}</td>
      <td>${d.phone || '-'}</td>
      <td style="color:${color};font-weight:bold">${statut}</td>
      <td>${expireDate ? expireDate.toLocaleDateString('fr-FR') : '-'}</td>
      <td>${d.codeLicence || '-'}</td>
      <td><button class="btn btn-orange" onclick="generateCodeFor('${d.email}','${d.phone||''}')">Renouveler</button></td>
    </tr>`;
  });
  document.getElementById('totalUsers').textContent = total;
  document.getElementById('activeUsers').textContent = active;
  document.getElementById('expiredUsers').textContent = expired;
}

window.generateCode = function(){
  const email = document.getElementById('clientEmail').value;
  const phone = document.getElementById('clientPhone').value;
  if(!email || !phone) return alert("Email + téléphone obligatoires. Format: 22896766875");
  generateCodeFor(email, phone);
}

window.generateCodeFor = async function(email, phone){
  const code = "GMB" + Math.random().toString(36).substr(2,4).toUpperCase();
  const expireAt = new Date(Date.now() + 30*24*60*60*1000);
  const msgBox = document.getElementById('genMsg');
  
  try{
    await setDoc(doc(db, "codesLicence", code), {
      email, phone, used: false, expireAt, createdAt: serverTimestamp()
    });

    const licencesSnap = await getDocs(collection(db, "licences"));
    licencesSnap.forEach(async docSnap=>{
      if(docSnap.data().email === email){
        await updateDoc(doc(db, "licences", docSnap.id), {
          codeLicence: code, phone, expireAt, statut: "actif"
        });
      }
    });

    const waLink = `https://wa.me/${phone}?text=Bonjour, voici votre code licence GMB24-RAA pour 30 jours: ${code}. Valable jusqu'au ${expireAt.toLocaleDateString('fr-FR')}`;
    
    msgBox.innerHTML = `<div class="msg success">
      Code généré: <b>${code}</b><br>
      Valable jusqu'au: ${expireAt.toLocaleDateString('fr-FR')}<br>
      <a href="${waLink}" target="_blank"><button class="btn btn-green">Envoyer sur WhatsApp</button></a>
    </div>`;
    
    document.getElementById('clientEmail').value = "";
    document.getElementById('clientPhone').value = "";
    await loadUsers();
  }catch(e){
    msgBox.innerHTML = `<div class="msg error">Erreur: ${e.message}</div>`;
  }
}
</script>
</body>
</html>
