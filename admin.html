<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB24 Admin - Générer Licence</title>
<style>
body{font-family:'Segoe UI',Arial,sans-serif;background:#1e3a8a;color:white;margin:0;padding:20px;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:white;color:#334155;border-radius:16px;padding:30px;max-width:400px;width:100%}
h1{color:#1e3a8a;margin-top:0;text-align:center}
label{display:block;margin-top:15px;font-weight:600}
input{width:100%;padding:12px;border:2px solid #cbd5e1;border-radius:8px;margin-top:4px;font-size:15px}
button{background:#7c3aed;color:white;border:none;padding:14px;border-radius:8px;width:100%;font-weight:bold;margin-top:20px;cursor:pointer;font-size:16px}
.code-box{background:#dcfce7;color:#166534;padding:15px;border-radius:8px;margin-top:15px;text-align:center;font-size:24px;font-weight:bold;letter-spacing:3px;display:none}
.info{background:#dbeafe;color:#1e40af;padding:12px;border-radius:8px;margin-top:15px;font-size:13px}
</style>
</head>
<body>
<div class="card">
<h1>🔑 Admin GMB24</h1>
<label>Numéro client WhatsApp :</label>
<input type="tel" id="phone" placeholder="+228 90 12 34 56">
<button onclick="genererCode()">Générer Code 30j - 5000F</button>
<div id="codeBox" class="code-box"></div>
<div class="info">Ce code active 30 jours pour le numéro. 1 code = 1 client.</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCBYnjsBMJGeR57Kk3FX9zeIplE5EFkcIY",
authDomain: "gmb24-raa.firebaseapp.com",
projectId: "gmb24-raa",
storageBucket: "gmb24-raa.firebasestorage.app",
messagingSenderId: "558507911211",
appId: "1:558507911211:web:5cdc99c082fe653684626e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.genererCode = async function() {
const phone = document.getElementById('phone').value.trim();
if(!phone) return alert('Entre le numéro');

const code = Math.random().toString(36).substring(2,8).toUpperCase();
await setDoc(doc(db, "codesLicence", code), {
phone, utilise: false, created: new Date().toISOString()
});

const box = document.getElementById('codeBox');
box.innerText = code;
box.style.display = 'block';
}
</script>
</body>
  </html>
