<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB24 - Admin Pro Fiscal</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;margin:0;padding:20px}
.container{max-width:600px;margin:auto;background:#1e293b;padding:30px;border-radius:12px}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0}
button{background:#3b82f6;border:none;cursor:pointer;font-weight:bold}
button:hover{background:#2563eb}
#loginBox,#adminBox{display:none}
.code-box{background:#0f172a;padding:15px;border-radius:8px;margin-top:15px;border:2px dashed #3b82f6}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
<h2>🔐 GMB24 Admin - Pro Fiscal</h2>

<div id="loginBox">
<h3>Connexion Admin</h3>
<input type="email" id="adminEmail" placeholder="Email admin" value="schoolraaliberte@gmail.com">
<input type="password" id="adminPass" placeholder="Mot de passe">
<button onclick="loginAdmin()">Se connecter</button>
<p id="loginMsg"></p>
</div>

<div id="adminBox">
<h3>📄 Générer Code Licence</h3>
<input type="tel" id="clientPhone" placeholder="+228XXXXXXXX" value="+228">
<button onclick="genererCode()">Générer Code GMB</button>
<div id="codeResult" class="code-box hidden"></div>
<button onclick="logout()">Déconnexion</button>
</div>

</div>

<script>
// CONFIG FIREBASE - Remplace par tes vraies clés
const firebaseConfig = {
  apiKey: "VOTRE_API_KEY",
  authDomain: "gmb24-raa.firebaseapp.com",
  projectId: "gmb24-raa",
  storageBucket: "gmb24-raa.appspot.com",
  messagingSenderId: "VOTRE_SENDER_ID",
  appId: "VOTRE_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_EMAIL = "schoolraaliberte@gmail.com";

// Vérifier connexion au chargement
auth.onAuthStateChanged(user => {
  if(user && user.email === ADMIN_EMAIL){
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminBox').style.display = 'block';
  } else {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('adminBox').style.display = 'none';
  }
});

async function loginAdmin(){
  const email = document.getElementById('adminEmail').value;
  const pass = document.getElementById('adminPass').value;
  const msg = document.getElementById('loginMsg');
  
  if(email !== ADMIN_EMAIL){
    msg.innerText = "❌ Email admin incorrect";
    msg.style.color = "red";
    return;
  }
  
  try{
    await auth.signInWithEmailAndPassword(email, pass);
    msg.innerText = "✅ Connecté";
    msg.style.color = "green";
  } catch(e){
    msg.innerText = "❌ " + e.message;
    msg.style.color = "red";
  }
}

function logout(){
  auth.signOut();
}

function genererCode(){
  const phone = document.getElementById('clientPhone').value;
  if(!phone.startsWith('+228') || phone.length < 13){
    alert("Numéro invalide. Format: +228XXXXXXXX");
    return;
  }
  
  const code = "GMB" + Math.random().toString(36).substr(2,6).toUpperCase();
  const ref = db.collection('codesLicence').doc(code);
  
  ref.set({
    phone: phone,
    code: code,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    used: false
  }).then(() => {
    document.getElementById('codeResult').classList.remove('hidden');
    document.getElementById('codeResult').innerHTML = `
      <b>Code généré:</b> ${code}<br>
      <b>Client:</b> ${phone}<br>
      <button onclick="copierCode('${code}')">Copier le code</button>
    `;
  }).catch(e => alert("Erreur: " + e.message));
}

function copierCode(code){
  navigator.clipboard.writeText(code);
  alert("Code copié: " + code);
}
</script>
</body>
</html>
