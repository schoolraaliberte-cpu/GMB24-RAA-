<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB24 Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body {font-family: Arial; background:#f5f5f5; margin:0; padding:15px;}
.card {background:white; padding:15px; margin-bottom:15px; border-radius:8px;}
input, button {width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:5px; box-sizing:border-box;}
button {background:#3498db; color:white; border:none; cursor:pointer; font-weight:bold;}
.btn-success {background:#27ae60;}
.btn-warning {background:#f39c12;}
label {font-size:13px;}
</style>
</head>
<body>

<div class="card">
  <h3>1. Ventes du jour</h3>
  <input type="text" id="produit" placeholder="Produit: Coca, Pain..." />
  <input type="number" id="prix_vente" placeholder="Prix FCFA" />
  <label><input type="checkbox" id="tva_vente" checked /> TVA 18%</label>
  <button onclick="enregistrerVente()">+ Vente</button>
  <div id="liste_ventes"></div>
</div>

<div class="card">
  <h3>2. Dépenses du mois</h3>
  <input type="text" id="libelle_depense" placeholder="Libellé: Loyer Avril..." />
  <input type="number" id="montant_depense" placeholder="Montant FCFA" />
  <label><input type="checkbox" id="tva_depense" /> TVA 18% récupérable</label>
  <button onclick="ajouterDepense()">+ Dépense</button>
  <div id="liste_depenses"></div>
</div>

<div class="card">
  <h3>3. Export PDF OTR</h3>
  <button class="btn-warning" onclick="exporterPDFMois()">📄 Télécharger PDF</button>
</div>

<script>
// Version anti-bug
let ventesJour = [];
let depensesMois = [];

function chargerData() {
  ventesJour = JSON.parse(localStorage.getItem('ventesJour_'+new Date().toDateString()) || '[]');
  depensesMois = JSON.parse(localStorage.getItem('depensesMois_'+new Date().toISOString().slice(0,7)) || '[]');
}

function enregistrerVente() {
  const produit = document.getElementById('produit').value.trim();
  const prix = parseFloat(document.getElementById('prix_vente').value);
  const aTVA = document.getElementById('tva_vente').checked;

  if (!produit ||!prix || prix <= 0) return alert('Remplis produit + prix');

  let prixHT = aTVA? Math.round(prix / 1.18) : prix;
  let montantTVA = aTVA? prix - prixHT : 0;
  let prixTTC = prix;

  ventesJour.push({produit, prixHT, prixTTC, montantTVA, aTVA, date: new Date().toISOString()});
  localStorage.setItem('ventesJour_'+new Date().toDateString(), JSON.stringify(ventesJour));
  document.getElementById('produit').value = '';
  document.getElementById('prix_vente').value = '';
  afficherVentes();
}

function ajouterDepense() {
  const libelle = document.getElementById('libelle_depense').value.trim();
  const montant = parseFloat(document.getElementById('montant_depense').value);
  const aTVA = document.getElementById('tva_depense').checked;

  if (!libelle ||!montant || montant <= 0) return alert('Remplis libellé + montant');

  let montantHT = aTVA? Math.round(montant / 1.18) : montant;
  let montantTVA = aTVA? montant - montantHT : 0;
  let montantTTC = montant;

  depensesMois.push({libelle, montantHT, montantTTC, montantTVA, aTVA, date: new Date().toISOString()});
  localStorage.setItem('depensesMois_'+new Date().toISOString().slice(0,7), JSON.stringify(depensesMois));
  document.getElementById('libelle_depense').value = '';
  document.getElementById('montant_depense').value = '';
  afficherDepenses();
}

function afficherVentes() {
  chargerData();
  const div = document.getElementById('liste_ventes');
  let html = '';
  ventesJour.forEach(v => {
    html += `${v.produit}: ${v.prixTTC.toLocaleString()} ${v.aTVA? '[TVA]' : '[Exo]'}<br>`;
  });
  div.innerHTML = html || 'Aucune vente';
}

function afficherDepenses() {
  chargerData();
  const div = document.getElementById('liste_depenses');
  let html = '';
  depensesMois.forEach(d => {
    html += `${d.libelle}: ${d.montantTTC.toLocaleString()} ${d.aTVA? '[TVA]' : '[Sans TVA]'}<br>`;
  });
  div.innerHTML = html || 'Aucune dépense';
}

// PDF SIMPLE ET SÛR
window.exporterPDFMois = function() {
  chargerData();

  if (typeof window.jspdf === 'undefined') {
    return alert('Erreur: jsPDF non chargé. Vérifie ta connexion internet et recharge la page.');
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const moisActuel = new Date().toISOString().slice(0, 7);

  // Récupérer ventes du mois SANS BUG
  let ventesMois = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('ventesJour_')) {
      try {
        const vJour = JSON.parse(localStorage.getItem(key));
        if (Array.isArray(vJour) && vJour.length > 0 && vJour[0].date) {
          if (vJour[0].date.slice(0,7) === moisActuel) {
            ventesMois = ventesMois.concat(vJour);
          }
        }
      } catch(e) {}
    }
  }

  const depensesMois = JSON.parse(localStorage.getItem('depensesMois_' + moisActuel) || '[]');

  // Calculs sécurisés
  const totalHT = ventesMois.reduce((sum, v) => sum + (v.prixHT || 0), 0);
  const tvaCollectee = ventesMois.reduce((sum, v) => sum + (v.montantTVA || 0), 0);
  const totalDepHT = depensesMois.reduce((sum, d) => sum + (d.montantHT || 0), 0);
  const tvaDeductible = depensesMois.reduce((sum, d) => sum + (d.montantTVA || 0), 0);
  const beneficeHT = totalHT - totalDepHT;
  const tvaAPayer = Math.max(0, tvaCollectee - tvaDeductible);

  // PDF simple
  doc.setFontSize(16);
  doc.text('GMB24 - RAPPORT OTR', 105, 20, {align: 'center'});
  doc.setFontSize(11);
  doc.text('Mois: ' + moisActuel, 20, 35);
  doc.text('CA HT: ' + totalHT.toLocaleString() + ' FCFA', 20, 45);
  doc.text('Depenses HT: ' + totalDepHT.toLocaleString() + ' FCFA', 20, 52);
  doc.text('Benefice HT: ' + beneficeHT.toLocaleString() + ' FCFA', 20, 59);
  doc.text('TVA Collectee: ' + tvaCollectee.toLocaleString() + ' FCFA', 20, 68);
  doc.text('TVA Deductible: ' + tvaDeductible.toLocaleString() + ' FCFA', 20, 75);
  doc.text('TVA A PAYER: ' + tvaAPayer.toLocaleString() + ' FCFA', 20, 84);

  // Dépenses avec explication
  let y = 100;
  doc.text('DEPENSES DETAIL:', 20, y);
  y += 10;
  depensesMois.forEach(d => {
    if (y > 270) { doc.addPage(); y = 20; }
    const ligne = new Date(d.date).toLocaleDateString('fr-FR') + ' - ' + d.libelle.substring(0,30) + ' : ' + d.montantTTC.toLocaleString();
    doc.text(ligne, 20, y);
    y += 8;
  });

  try {
    doc.save('GMB24_' + moisActuel + '.pdf');
    alert('PDF téléchargé! Vérifie dossier Téléchargements');
  } catch(e) {
    alert('Erreur téléchargement: ' + e.message + '\nEssaye sur Chrome avec internet.');
  }
}

// Charger au démarrage
chargerData();
afficherVentes();
afficherDepenses();
</script>
</body>
</html>
